# --- Structure ---

derivation_count: 47
derivation_range: "1–47"
phases: 16

primitives:
  count: 4
  note: "3 irreducible + 1 derived (mediant, via D29)"
  list:
    - "Integers Z (counting)"
    - "Mediant (a+c)/(b+d) — derived from energy conservation + stability (D29)"
    - "Fixed-point x = f(x) (self-reference)"
    - "Parabola x² + μ = 0 (bifurcation)"

free_parameters_note: >
  The phrase "zero free parameters" is retired; see
  sync_cost/derivations/statistical_conventions.md. The framework
  requires two dimensional anchors (below) and contains finite-depth
  predictions with un-derived O(1) factors. Individual predictions
  are classified by Z1-Z3 in statistical_conventions.md; the overall
  framework does not claim zero free parameters. See
  numerology_inventory.md and framework_status.md for per-claim
  classification.
dimensionful_inputs: 2
dimensionful_input_note: >
  Two independent observational anchors per `anchor_count_audit.md`:
  (1) the cosmological scale H_0 (equivalently Λ, ℓ_P, or M_P; these
  are all interconverted by the framework integer R = 6 × 13^54 and
  the identity Λℓ_P² = 13^-108 / 12), and (2) the particle-sector
  scale v_EW = 246 GeV. Reducing to one anchor would require closing
  the v/M_P gap via a framework-derived dimensionless identity; five
  explicit obstructions to that reduction are catalogued in
  `anchor_count_audit.md`. Previous MANIFEST language claiming a
  single dimensionful input overstated the repo's actual derivation
  state.
dimensionful_inputs_detail:
  cosmological:
    anchor: "H_0 (equivalently Λ, ℓ_P, M_P via R)"
    covers: ["Λ", "ℓ_P", "t_P", "M_P", "ρ_crit", "cosmic-timeline scales"]
  particle:
    anchor: "v_EW = 246 GeV"
    covers: ["ℏ (absolute)", "c (absolute)", "G (absolute)", "absolute lepton/quark/gauge-boson masses", "m_H"]
  v_over_MP_gap:
    observed: "v/M_P ≈ 2.017e-17"
    nearest_numerology: "13^-15 = 1.954e-17 (3.1% off, not derived)"
    status: "open; see anchor_count_audit.md §Obstructions for five specific blockers"

