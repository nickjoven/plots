# --- Bare K=1 identities ---
# Measure-theoretic consequences of duty(q) = 1/q^d at critical coupling
# (duty_dimension_proof.md). These are *substrate-side* reference values
# at K=1, not predictions at observational scales. The 1–3% gaps to M_Z
# observables are anchor-side amplification factors per Instance 7 of
# vocabulary_is_the_work_pattern.md (same shape as A_s, v/M_P, lattice-QCD
# bare-vs-renormalized); the framework correctly declines to predict the
# amplifications. The cloud is statistically consistent with pigeonhole
# at α=0.05 across 0.1%/1%/3% thresholds (numerology_count_phase_b.md,
# Region C Phase B verdict 2026-04-26); single-instance audits land
# Class 2 by construction. See remaining_gap_shapes.md Shape B.

bare_k1_identities:
  sin2_theta_W:
    form: "q_2^3 / (q_2^3 + q_3^3)"
    value: "8/35 = 0.22857..."
    source: ["duty_dimension_proof", "three_dimensions", "klein_bottle_derivation", "gauge_dictionary"]
    status: "substrate-side bare reference; not a prediction at M_Z"
    m_z_gap: "1.1% vs PDG 0.23121; anchor-side amplification (Instance 7); Class 2 by construction (Shape B pigeonhole, numerology_count_phase_b.md). SM running ruled out (sinW_running_check.py); K-scanning ruled out (sinw_fixed_point.md); d_eff = 80/27 ansatz G1-null (problem/sin2_theta_w_deff_80_27/)."

  alpha_s_over_alpha_2:
    form: "q_3^3 / q_2^3"
    value: "27/8 = 3.375"
    source: ["duty_dimension_proof", "three_dimensions", "klein_bottle_derivation", "duty_cycle_dictionary"]
    status: "substrate-side bare reference; not a prediction at M_Z"
    m_z_gap: "3.2% vs PDG 3.488; anchor-side amplification (Instance 7); Class 2 by construction (Shape B pigeonhole)."

  inv_alpha_em_tree:
    form: "q_2^3 + q_3^3"
