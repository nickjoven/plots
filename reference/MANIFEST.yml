# Updated: 2026-04-07
# Source of truth: this file (MANIFEST.yml) is canonical for
# quantitative claims. Per-prediction Z1–Z3 classification lives in
# sync_cost/derivations/numerology_inventory.md. At-a-glance status
# map in sync_cost/derivations/framework_status.md. Derivation graph
# in docs/derivation-graph.json (generated by
